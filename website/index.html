<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深夜书房 — 小说管理</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Toast notification container -->
    <div class="toast-container" aria-live="polite"></div>

    <!-- App shell -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <a class="header-brand" href="#" data-view="bookshelf" title="回到书架">
                <span class="header-icon">🌙</span>
                <span class="header-title">深夜书房</span>
            </a>
            <nav class="header-nav">
                <button class="nav-link active" data-view="bookshelf">📚 书架</button>
                <button class="nav-link" data-view="stats">📊 统计</button>
                <button class="nav-link admin-lock" title="管理员登录">🔒 登录</button>
            </nav>
        </header>

        <!-- Main content area — rendered by JS -->
        <main class="main-content">
            <div class="empty-state">
                <div class="empty-icon">📚</div>
                <h3>正在加载...</h3>
                <p>请稍候，书架即将呈现。</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
